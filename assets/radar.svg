<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Mission-control radar">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <circle cx="100" cy="100" r="95" fill="#0a0e17"/>

  <g stroke="#f8fafc" fill="none">
    <circle cx="100" cy="100" r="80" stroke-width="0.5" stroke-opacity="0.25"/>
    <circle cx="100" cy="100" r="60" stroke-width="0.5" stroke-opacity="0.20"/>
    <circle cx="100" cy="100" r="40" stroke-width="0.5" stroke-opacity="0.16"/>
    <circle cx="100" cy="100" r="20" stroke-width="0.5" stroke-opacity="0.14"/>
    <line x1="100" y1="5"  x2="100" y2="195" stroke-width="0.3" stroke-opacity="0.16"/>
    <line x1="5"  y1="100" x2="195" y2="100" stroke-width="0.3" stroke-opacity="0.16"/>
  </g>

  <circle cx="100" cy="100" r="85" fill="url(#glow)"/>

  <g>
    <path d="M 100,100 L 100,5 A 95,95 0 0,1 186.60,50 Z" fill="url(#sweep)"/>
    <line x1="100" y1="100" x2="100" y2="5" stroke="#3b82f6" stroke-width="1.2"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4.5s" repeatCount="indefinite"/>
  </g>

  <circle cx="140" cy="70" r="2" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" keyTimes="0;0.05;0.25;1" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="70" cy="140" r="2" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" keyTimes="0;0.05;0.25;1" repeatCount="indefinite" begin="2.4s"/>
  </circle>
  <circle cx="135" cy="135" r="2" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" keyTimes="0;0.05;0.25;1" repeatCount="indefinite" begin="1.55s"/>
  </circle>
  <circle cx="55" cy="75" r="1.5" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" keyTimes="0;0.05;0.25;1" repeatCount="indefinite" begin="3.3s"/>
  </circle>

  <circle cx="100" cy="100" r="3" fill="#3b82f6"/>
</svg>
